# Jellyfish AI 短剧工厂 - Docker Compose
#
# 用法:
#   首次构建:  docker compose build
#   启动全部:  docker compose up -d
#   查看日志:  docker compose logs -f
#   停止全部:  docker compose down

services:
  # ── Redis（Celery broker）──────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── 后端 API（FastAPI + uvicorn）────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8443:8000"
    environment:
      APP_NAME: "Jellyfish API"
      DEBUG: "false"
      API_V1_PREFIX: "/api/v1"
      DATABASE_URL: "sqlite+aiosqlite:///./data/jellyfish.db"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      CORS_ORIGINS: "http://45.120.100.154:8444"
      # OPENAI_API_KEY: "sk-xxx"
      # IMAGE_API_PROVIDER: "openai"
      # IMAGE_API_BASE_URL: "https://api.openai.com/v1/images/generations"
      # IMAGE_API_KEY: "sk-xxx"
      # VIDEO_API_PROVIDER: "openai"
      # VIDEO_API_BASE_URL: "https://api.openai.com/v1/videos/generations"
      # VIDEO_API_KEY: "sk-xxx"
    volumes:
      - backend_db:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Celery Worker（与后端同镜像）───────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["celery", "-A", "app.core.celery_app:celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    environment:
      DATABASE_URL: "sqlite+aiosqlite:///./data/jellyfish.db"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      # OPENAI_API_KEY: "sk-xxx"
    volumes:
      - backend_db:/app/data
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ── 前端（nginx 静态服务）──────────────────────────────────────
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://45.120.100.154:8443"
    restart: unless-stopped
    ports:
      - "8444:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis_data:
  backend_db:
