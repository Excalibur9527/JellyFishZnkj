server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;

  # Ensure runtime env is not cached aggressively
  location = /env.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    try_files $uri =404;
  }

  # 代理 RustFS 文件（供外部服务如 Kling 访问）
  location /storage/ {
    proxy_pass http://rustfs:9000/jellyfish-assets/;
    proxy_set_header Host rustfs:9000;
  }

  location / {
    try_files $uri /index.html;
  }
}

