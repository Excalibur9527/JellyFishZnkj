<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1" />
      <stop offset="1" stop-color="#A855F7" />
    </linearGradient>
    <linearGradient id="z_grad" x1="55" y1="55" x2="145" y2="145" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="1" stop-color="#E0D7FF" stop-opacity="0.9" />
    </linearGradient>
  </defs>

  <!-- 圆角方形背景 -->
  <rect width="200" height="200" rx="44" fill="url(#bg_grad)" />

  <!-- Z 字母 -->
  <path
    d="M55 62 L145 62 L65 138 L145 138"
    stroke="url(#z_grad)"
    stroke-width="18"
